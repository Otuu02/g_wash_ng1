name: g_wash_ng
description: On-demand car wash, house cleaning, and laundry marketplace for Nigeria
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ==========================================
  # FIREBASE (Backend)
  # ==========================================
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # ==========================================
  # STATE MANAGEMENT
  # ==========================================
  flutter_riverpod: ^2.5.1
  provider: ^6.0.5

  # ==========================================
  # NAVIGATION
  # ==========================================
  go_router: ^14.2.3

  # ==========================================
  # MAPS & LOCATION
  # ==========================================
  google_maps_flutter: ^2.8.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  location: ^7.0.0
  flutter_polyline_points: ^2.1.0
  map_launcher: ^3.5.0

  # ==========================================
  # HTTP & API
  # ==========================================
  http: ^1.2.2
  dio: ^5.4.3+1

  # ==========================================
  # STORAGE
  # ==========================================
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # ==========================================
  # UTILITIES
  # ==========================================
  image_picker: ^1.1.2
  intl: ^0.20.2
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  flutter_native_splash: ^2.4.0
  crypto: ^3.0.3

  # ==========================================
  # UI COMPONENTS
  # ==========================================
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  lottie: ^3.1.0
  animations: ^2.0.11

  # ==========================================
  # PAYMENTS
  # ==========================================
  flutterwave_standard: ^1.0.8

  # ==========================================
  # CHAT & NOTIFICATIONS
  # ==========================================
  flutter_chat_ui: ^1.6.15
  timeago: ^3.6.0
  flutter_local_notifications: ^17.1.0

  # ==========================================
  # IMAGE PROCESSING
  # ==========================================
  photo_view: ^0.15.0

  # ==========================================
  # FORMS & VALIDATION (UPDATED)
  # ==========================================
  flutter_form_builder: ^10.3.0+2 # ← UPDATED
  form_builder_validators: ^11.0.0

  # ==========================================
  # ANALYTICS & CRASH REPORTING
  # ==========================================
  sentry_flutter: ^8.4.0
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/images/logo_small.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0CAF60"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0CAF60"
  image: "assets/images/logo.png"
  android: true
  ios: true
  web: true