name: g_wash_ng
description: On-demand car wash, house cleaning, and laundry marketplace for Nigeria
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ==========================================
  # FIREBASE (Backend)
  # ==========================================
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # ==========================================
  # STATE MANAGEMENT
  # ==========================================
  provider: ^6.0.5
  flutter_riverpod: ^2.6.1

  # ==========================================
  # MAPS & LOCATION
  # ==========================================
  google_maps_flutter: ^2.10.1
  geolocator: ^13.0.2
  geocoding: ^4.0.0

  # ==========================================
  # HTTP & API
  # ==========================================
  http: ^1.2.2

  # ==========================================
  # STORAGE
  # ==========================================
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # ==========================================
  # UTILITIES
  # ==========================================
  image_picker: ^1.1.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

  # ==========================================
  # UI COMPONENTS
  # ==========================================
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  lottie: ^3.1.0

  # ==========================================
  # FORMS - ONLY THE ESSENTIAL ONE
  # ==========================================
  flutter_form_builder: ^9.1.0
  # form_builder_validators REMOVED - causing crash

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/